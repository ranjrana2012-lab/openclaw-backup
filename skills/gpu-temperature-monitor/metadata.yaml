id: gpu-temperature-monitor
name: GPU Temperature Monitor
category: devops
version: 1.0.0
status: ready
owner: internal-team
description: Continuously monitors thermal throttling and memory utilization of NVIDIA GPUs to ensure the DGX Spark system operates within safe thermal limits.
tags:
  - gpu
  - monitoring
  - health
  - devops
inputs:
  - name: gpu_id
    type: integer
    required: false
    default: null
    description: The index of the specific GPU to monitor. If null, monitors all.
  - name: threshold
    type: float
    required: false
    default: 80.0
    description: The critical temperature threshold in degrees Celsius.
  - name: polling_interval
    type: integer
    required: false
    default: 5
    description: How often to check the temperature in seconds.
outputs:
  - name: status
    type: string
    description: The status of the GPU health (OK, WARNING, CRITICAL).
  - name: temperature_celsius
    type: float
    description: The current temperature reading.
  - name: utilization_percent
    type: float
    description: The estimated utilization of the GPU based on current load.
  - name: fan_speed_percent
    type: integer
    description: The current fan speed as a percentage.
  - name: memory_used_mb
    type: integer
    description: The amount of memory currently in use (VRAM).
  - name: memory_total_mb
    type: integer
    description: The total memory available on the GPU.
  - name: alert_message
    type: string
    description: A message explaining the alert or status.
dependencies:
  services:
    - nvidia-smi
  secrets: []
tests:
  command: pytest tests/
  coverage_threshold: 80
security:
  requires_approval: false
  secrets_required: false
  network_access: false
  risk_level: medium
performance:
  avg_latency_ms: 500
  max_latency_ms: 2000
changelog:
  - version: 1.0.0
    date: 2026-02-05
    changes: Initial release
